reproduce_command: |
  # Step 1: Precompute embeddings and BM25 index (one-time, ~20-30 min)
  python src/precompute.py --candidates ./candidates.jsonl
  # Step 2: LLM semantic scoring of top 5000 candidates (optional, requires API key)
  ANTHROPIC_API_KEY=<your-key> python run_llm_scoring.py --top-n 5000
  # Step 3: Rank (≤5 min, CPU only, no network)
  python src/rank.py --candidates ./candidates.jsonl --out ./submission.csv

