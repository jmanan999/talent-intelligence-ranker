ai_usage_summary: |
  Claude Haiku (claude-haiku-4-5-20251001) is used EXCLUSIVELY in the precompute phase
  to semantically score the top 5000 candidates on 4 dimensions: retrieval depth,
  production quality, career trajectory, and antipattern absence. Scores are saved to
  artifacts/llm_scores.parquet and loaded (not re-generated) at rank time.

  This is architecturally equivalent to using a language model to generate embeddings —
  the output is precomputed and cached; no LLM calls happen during the 5-minute rank step.

  Claude Sonnet 4.6 was also used as a development assistant for architecture design.
  All engineering decisions, feature weights, and evaluation methodology are human-designed.

methodology_summary: |
  Multi-stage hybrid candidate ranker with LLM semantic scoring as the crown signal.

  Pipeline:
  (1) PRECOMPUTE (offline, can use network):
      - BGE-small-en embeddings (384-dim, L2-normalized) for all 100K candidates
      - 7 JD anchor embeddings encoding what the role actually means
      - BM25 index over career descriptions (descriptions weighted 3× over skills)
      - Claude Haiku LLM scoring of top 5000 candidates on 4 semantic dimensions

  (2) PARSING (in rank step):
      - Extract all 23 redrob behavioral signals (not just 5 as in baseline)
      - Compute notice period score (JD explicitly mentions sub-30-day preference)
      - Compute verified skill assessment composite (gold signal: test scores vs. self-report)
      - Compute platform engagement composite (12 signals combined)

  (3) FEATURES (12 vectorized features):
      - role_fit_dense (BGE cosine to JD anchors), role_fit_sparse (BM25)
      - evidence_eval (NDCG/MRR/MAP language in career descriptions)
      - product_ratio (career months at product companies vs. services)
      - yoe_band (smooth peak at 5-9 yrs), tenure_stability, recent_handon
      - location_fit, skill_assessment (verified), notice_score, github_activity, engagement

  (4) SCORING (blended):
      - If LLM scores available: 40% LLM + 60% features
      - Always: × availability (9-signal multiplier) × consistency (honeypot) × 6 penalties

  (5) PENALTIES (multiplicative, not hard filters):
      - keyword_stuffer (0.10×), all_consulting (0.35×), cv_speech_primary (0.50×)
      - llm_wrapper_only (0.55×), non_tech_no_retrieval (0.40×), international_no_relocate (0.50×)

  Key design insight from JD: "The right answer involves reasoning about the gap between
  what the JD says and what the JD means." The LLM scoring layer implements exactly this —
  semantic understanding of career narratives rather than keyword pattern matching.

